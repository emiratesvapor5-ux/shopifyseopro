name: GOD SEO Nightly Batch (12AM-8AM UAE)

on:
  schedule:
    # 12:00 AM UAE (UTC+4) = 20:00 UTC
    - cron: '0 20 * * *'
    # 04:00 AM UAE (UTC+4) = 00:00 UTC — second pass for any failures
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        required: true
        default: "all-chunks"
        type: choice
        options:
          - "all-chunks"
          - "test-1"

jobs:
  god-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        chunk: [1, 2, 3, 4, 5, 6]

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Restore progress cache
        uses: actions/cache@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-chunk-${{ matrix.chunk }}-${{ github.run_number }}
          restore-keys: |
            batch-progress-chunk-${{ matrix.chunk }}-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports

      - name: Run GOD SEO chunk
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "test-1" ] && [ "${{ matrix.chunk }}" != "1" ]; then
            echo "Test mode: skipping chunk-${{ matrix.chunk }}"
            exit 0
          fi
          if [ "$MODE" = "test-1" ]; then
            python3 -u src/batch_god_seo.py --limit 1
          else
            python3 -u src/batch_god_seo.py --resume --chunk ${{ matrix.chunk }}
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save progress cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-chunk-${{ matrix.chunk }}-${{ github.run_number }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-chunk-${{ matrix.chunk }}-run${{ github.run_number }}
          path: |
            rank_reports/batch_god_run.log
            rank_reports/batch_progress.json
          retention-days: 7

