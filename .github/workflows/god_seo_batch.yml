name: GOD SEO Batch Runner

on:
  workflow_dispatch:
    inputs:
      chunk:
        description: "Chunk number (1=products 1-60, 2=61-120, 3=121-180, 4=181-246)"
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3", "4"]
      vendor:
        description: "Filter by vendor (leave empty for all)"
        required: false
        default: ""

jobs:
  god-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
      SHOPIFY_SHOP: emirates-vapor.myshopify.com
      STORE_DOMAIN: emiratesvapor.ae

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Download progress from previous runs
        uses: actions/cache@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-${{ github.run_number }}
          restore-keys: |
            batch-progress-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports

      - name: Run GOD SEO batch (chunk ${{ github.event.inputs.chunk }})
        run: |
          python3 -u src/batch_god_seo.py \
            --chunk ${{ github.event.inputs.chunk }} \
            --resume \
            ${{ github.event.inputs.vendor != '' && format('--vendor "{0}"', github.event.inputs.vendor) || '' }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload logs and progress
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-batch-chunk-${{ github.event.inputs.chunk }}-logs
          path: |
            rank_reports/batch_god_run.log
            rank_reports/batch_progress.json
            rank_reports/GOD_*.md
          retention-days: 30
