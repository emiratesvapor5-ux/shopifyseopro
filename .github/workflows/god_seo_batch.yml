name: GOD SEO Batch Runner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        required: true
        default: "test-1"
        type: choice
        options:
          - "test-1"       # Run 1 product only (verify quality)
          - "chunk-1"      # Products 1–62
          - "chunk-2"      # Products 63–124
          - "chunk-3"      # Products 125–186
          - "chunk-4"      # Products 187–246
      vendor:
        description: "Filter by vendor (optional, e.g. 'GeekVape')"
        required: false
        default: ""

jobs:
  god-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Restore progress cache
        uses: actions/cache@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-${{ github.run_number }}
          restore-keys: |
            batch-progress-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports src

      - name: Build run command
        id: cmd
        run: |
          MODE="${{ github.event.inputs.mode }}"
          VENDOR="${{ github.event.inputs.vendor }}"
          CMD="python3 -u src/batch_god_seo.py --resume"
          if [ "$MODE" = "test-1" ]; then
            CMD="$CMD --limit 1"
          else
            CHUNK="${MODE#chunk-}"
            CMD="$CMD --chunk $CHUNK"
          fi
          if [ -n "$VENDOR" ]; then
            CMD="$CMD --vendor \"$VENDOR\""
          fi
          echo "cmd=$CMD" >> $GITHUB_OUTPUT
          echo "Running: $CMD"

      - name: Run GOD SEO
        run: ${{ steps.cmd.outputs.cmd }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload logs and reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: god-seo-${{ github.event.inputs.mode }}-${{ github.run_number }}
          path: |
            rank_reports/batch_god_run.log
            rank_reports/batch_progress.json
            rank_reports/GOD_*.md
          retention-days: 30
