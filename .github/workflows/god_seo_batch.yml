name: GOD SEO Batch Runner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        required: true
        default: "test-1"
        type: choice
        options:
          - "test-1"       # Run 1 product only (fresh, ignores cache)
          - "chunk-1"      # Products  1–41  (~3.5 hrs)
          - "chunk-2"      # Products 42–82  (~3.5 hrs)
          - "chunk-3"      # Products 83–123 (~3.5 hrs)
          - "chunk-4"      # Products 124–164 (~3.5 hrs)
          - "chunk-5"      # Products 165–205 (~3.5 hrs)
          - "chunk-6"      # Products 206–246 (~3.5 hrs)
      vendor:
        description: "Filter by vendor (optional, e.g. 'GeekVape')"
        required: false
        default: ""

jobs:
  god-seo:
    runs-on: ubuntu-latest
    # 5 hours per job — each chunk is ~41 products × 5 min = 205 min max.
    # 300 min ceiling gives a 95-min safety buffer even if some products are slow.
    timeout-minutes: 300

    env:
      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      # Only restore progress cache for chunk runs — test-1 always starts fresh
      - name: Restore progress cache (chunk runs only)
        if: startsWith(github.event.inputs.mode, 'chunk-')
        uses: actions/cache@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-${{ github.event.inputs.mode }}-${{ github.run_number }}
          restore-keys: |
            batch-progress-${{ github.event.inputs.mode }}-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports src

      - name: Build run command
        id: cmd
        run: |
          MODE="${{ github.event.inputs.mode }}"
          VENDOR="${{ github.event.inputs.vendor }}"

          if [ "$MODE" = "test-1" ]; then
            # test-1: always fresh (no --resume), run exactly 1 product
            CMD="python3 -u src/batch_god_seo.py --limit 1"
          else
            # chunk-N: resume from cache, run the Nth slice of 41 products
            CHUNK="${MODE#chunk-}"
            CMD="python3 -u src/batch_god_seo.py --resume --chunk $CHUNK"
          fi

          if [ -n "$VENDOR" ]; then
            CMD="$CMD --vendor \"$VENDOR\""
          fi
          echo "cmd=$CMD" >> $GITHUB_OUTPUT
          echo "Running: $CMD"

      - name: Run GOD SEO
        run: ${{ steps.cmd.outputs.cmd }}
        env:
          PYTHONUNBUFFERED: "1"

      # Save progress so the next chunk can resume from exactly where this one stopped
      - name: Save progress cache (chunk runs only)
        if: startsWith(github.event.inputs.mode, 'chunk-') && always()
        uses: actions/cache/save@v4
        with:
          path: rank_reports/batch_progress.json
          key: batch-progress-${{ github.event.inputs.mode }}-${{ github.run_number }}

      - name: Upload logs and reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: god-seo-${{ github.event.inputs.mode }}-${{ github.run_number }}
          path: |
            rank_reports/batch_god_run.log
            rank_reports/batch_progress.json
            rank_reports/GOD_*.md
          retention-days: 30
