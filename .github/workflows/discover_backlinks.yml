name: Discover New Backlink Sites (Telegraph-like)

on:
  schedule:
    # Run 1st of every month at 2AM UAE (22:00 UTC previous day)
    - cron: '0 22 L * *'
    # Also run every Sunday night for fresher results
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "full"
        type: choice
        options:
          - "full"        # Full discovery + testing
          - "test-only"   # Re-test previously found candidates

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Restore previous candidates cache
        uses: actions/cache@v4
        with:
          path: rank_reports/tested_candidates.json
          key: backlink-candidates-${{ github.run_number }}
          restore-keys: |
            backlink-candidates-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports

      - name: Run discovery engine
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test-only" ]; then
            python3 -u src/discover_backlink_sites.py --test-only
          else
            python3 -u src/discover_backlink_sites.py
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save candidates cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: rank_reports/tested_candidates.json
          key: backlink-candidates-${{ github.run_number }}

      - name: Upload discovery results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovered-sites-${{ github.run_number }}
          path: |
            rank_reports/discovered_sites.json
            rank_reports/tested_candidates.json
            rank_reports/new_sites_code.py
          retention-days: 90
