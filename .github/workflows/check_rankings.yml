name: UAE Keyword Rank Checker (Google.ae + Bing)

on:
  schedule:
    # Every Monday at 6AM UAE (02:00 UTC) — weekly fresh rankings
    - cron: '0 2 * * 1'
    # Every Thursday at 6AM UAE — mid-week check
    - cron: '0 2 * * 4'
  workflow_dispatch:
    inputs:
      keywords:
        description: "Extra keywords to check (comma-separated, added to default list)"
        required: false
        default: ""
      top:
        description: "Check top N positions (default: 100)"
        required: false
        default: "100"

jobs:
  check-rankings:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q requests

      - name: Restore previous rankings (for change tracking)
        uses: actions/cache@v4
        with:
          path: rank_reports/rankings_latest.json
          key: rankings-latest-${{ github.run_number }}
          restore-keys: |
            rankings-latest-

      - name: Create rank_reports directory
        run: mkdir -p rank_reports

      - name: Check UAE keyword rankings
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            ARGS="--keywords \"${{ github.event.inputs.keywords }}\""
          fi
          if [ -n "${{ github.event.inputs.top }}" ]; then
            ARGS="$ARGS --top ${{ github.event.inputs.top }}"
          fi
          eval python3 -u src/check_rankings.py $ARGS
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save rankings cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: rank_reports/rankings_latest.json
          key: rankings-latest-${{ github.run_number }}

      - name: Upload ranking reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankings-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            rank_reports/rankings_*.json
            rank_reports/rankings_report.md
          retention-days: 180

      - name: Print report summary
        if: always()
        run: |
          echo "=========================================="
          echo "RANKING REPORT"
          echo "=========================================="
          cat rank_reports/rankings_report.md 2>/dev/null || echo "No report generated"
